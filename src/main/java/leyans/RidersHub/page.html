<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RidersHub WebSocket Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .panel {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
        }
        #messageArea {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #f9f9f9;
        }
        form {
            margin-top: 15px;
        }
        input, button {
            padding: 8px;
            margin: 5px 0;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background-color: #45a049;
        }
        .message {
            margin-bottom: 8px;
            padding: 5px;
            border-bottom: 1px solid #eee;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
<h1>RidersHub WebSocket Test</h1>

<div class="container">
    <div class="panel">
        <h2>WebSocket Connection</h2>
        <div>
            <label for="wsUrl">WebSocket URL:</label>
            <input type="text" id="wsUrl" value="ws://localhost:8080/ws/locations">
        </div>
        <div>
            <button id="connectBtn">Connect</button>
            <button id="disconnectBtn" disabled>Disconnect</button>
        </div>
        <div id="connectionStatus">Status: Disconnected</div>

        <h2>WebSocket Messages</h2>
        <div id="messageArea"></div>
    </div>

    <div class="panel">
        <h2>Create/Update Location</h2>
        <form id="locationForm">
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" required>
            </div>
            <div>
                <label for="locationName">Location Name:</label>
                <input type="text" id="locationName" required>
            </div>
            <div>
                <label for="latitude">Latitude:</label>
                <input type="number" id="latitude" step="0.000001" required>
            </div>
            <div>
                <label for="longitude">Longitude:</label>
                <input type="number" id="longitude" step="0.000001" required>
            </div>
            <div>
                <button type="submit" id="submitBtn">Create Location</button>
            </div>
        </form>

        <h2>Find Nearby Locations</h2>
        <form id="nearbyForm">
            <div>
                <label for="searchLatitude">Latitude:</label>
                <input type="number" id="searchLatitude" step="0.000001" required>
            </div>
            <div>
                <label for="searchLongitude">Longitude:</label>
                <input type="number" id="searchLongitude" step="0.000001" required>
            </div>
            <div>
                <label for="searchRadius">Radius (meters):</label>
                <input type="number" id="searchRadius" value="1000" required>
            </div>
            <div>
                <button type="submit">Find Nearby</button>
            </div>
        </form>
        <div id="nearbyResults"></div>
    </div>
</div>

<script>
    let socket = null;
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const connectionStatus = document.getElementById('connectionStatus');
    const messageArea = document.getElementById('messageArea');
    const locationForm = document.getElementById('locationForm');
    const nearbyForm = document.getElementById('nearbyForm');
    const nearbyResults = document.getElementById('nearbyResults');

    // Add message to the message area
    function addMessage(message, type = '') {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message ' + type;
        messageDiv.textContent = message;
        messageArea.appendChild(messageDiv);
        messageArea.scrollTop = messageArea.scrollHeight;
    }

    // Connect WebSocket
    connectBtn.addEventListener('click', () => {
        const wsUrl = document.getElementById('wsUrl').value;

        try {
            socket = new WebSocket(wsUrl);

            socket.onopen = function(event) {
                addMessage('WebSocket connection established', 'success');
                connectionStatus.textContent = 'Status: Connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
            };

            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                addMessage('Received: ' + JSON.stringify(data, null, 2));
            };

            socket.onerror = function(error) {
                addMessage('WebSocket error: ' + error, 'error');
                connectionStatus.textContent = 'Status: Error';
            };

            socket.onclose = function(event) {
                addMessage('WebSocket connection closed', 'error');
                connectionStatus.textContent = 'Status: Disconnected';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
            };
        } catch (error) {
            addMessage('Failed to connect: ' + error.message, 'error');
        }
    });

    // Disconnect WebSocket
    disconnectBtn.addEventListener('click', () => {
        if (socket) {
            socket.close();
            socket = null;
        }
    });

    // Create/Update Location
    locationForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const locationData = {
            username: document.getElementById('username').value,
            locationName: document.getElementById('locationName').value,
            latitude: parseFloat(document.getElementById('latitude').value),
            longitude: parseFloat(document.getElementById('longitude').value)
        };

        try {
            const response = await fetch('/api/locations/create', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(locationData)
            });

            if (!response.ok) {
                throw new Error(`Server responded with status: ${response.status}`);
            }

            const data = await response.json();
            addMessage('Location created successfully: ' + JSON.stringify(data, null, 2), 'success');
        } catch (error) {
            addMessage('Failed to create location: ' + error.message, 'error');
        }
    });

    // Find nearby locations
    nearbyForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const latitude = parseFloat(document.getElementById('searchLatitude').value);
        const longitude = parseFloat(document.getElementById('searchLongitude').value);
        const radius = parseFloat(document.getElementById('searchRadius').value);

        try {
            const response = await fetch(`/api/locations/nearby?latitude=${latitude}&longitude=${longitude}&radius=${radius}`);

            if (!response.ok) {
                throw new Error(`Server responded with status: ${response.status}`);
            }

            const data = await response.json();

            // Display results
            nearbyResults.innerHTML = '<h3>Nearby Locations:</h3>';

            if (data.length === 0) {
                nearbyResults.innerHTML += '<p>No locations found.</p>';
            } else {
                const resultList = document.createElement('ul');

                data.forEach(location => {
                    const listItem = document.createElement('li');
                    listItem.textContent = `${location.locationName} - Distance: ${Math.round(location.distance)} meters`;
                    resultList.appendChild(listItem);
                });

                nearbyResults.appendChild(resultList);
            }

            addMessage('Found ' + data.length + ' nearby locations', 'success');
        } catch (error) {
            addMessage('Failed to find nearby locations: ' + error.message, 'error');
        }
    });

    // Use geolocation if available
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(position => {
            document.getElementById('latitude').value = position.coords.latitude;
            document.getElementById('longitude').value = position.coords.longitude;
            document.getElementById('searchLatitude').value = position.coords.latitude;
            document.getElementById('searchLongitude').value = position.coords.longitude;
        });
    }
</script>
</body>
</html>
